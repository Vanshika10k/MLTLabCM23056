<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Fruit Classifier</title>

<!-- TensorFlow + MobileNet -->
<script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@4.10.0"></script>
<script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/mobilenet"></script>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: linear-gradient(135deg, #ff7e5f, #feb47b);
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    color: white;
}

.container {
    background: rgba(255,255,255,0.2);
    padding: 30px;
    border-radius: 15px;
    text-align: center;
    width: 350px;
}

img {
    width: 220px;
    height: 220px;
    object-fit: cover;
    border-radius: 10px;
    margin-top: 10px;
    border: 3px solid white;
}

button {
    margin-top: 15px;
    padding: 10px 20px;
    border: none;
    background: #ff9800;
    color: white;
    border-radius: 8px;
    cursor: pointer;
}

button:hover {
    background: #ffa726;
}

.result {
    margin-top: 15px;
    font-size: 18px;
}
</style>
</head>

<body>

<div class="container">
    <h1>🍎 Fruit Classifier</h1>

    <input type="file" id="upload"><br>
    <img id="preview">

    <br>
    <button onclick="predict()">Predict</button>

    <div class="result" id="result">Loading model...</div>
</div>

<script src="script.js"></script>

</body>
</html>
