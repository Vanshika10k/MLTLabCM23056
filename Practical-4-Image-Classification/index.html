<!DOCTYPE html>
<html>
<head>
<title>Practical 4 - Image Classification</title>

<!-- TensorFlow -->
<script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@4.10.0"></script>

<!-- MobileNet -->
<script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/mobilenet@2.1.0"></script>

<style>

body{
margin:0;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:linear-gradient(135deg,#ff9a9e,#fad0c4);
font-family:Arial;
}

.card{
background:white;
padding:25px;
width:420px;
border-radius:15px;
text-align:center;
box-shadow:0 10px 25px rgba(0,0,0,0.3);
}

img{
margin-top:15px;
max-width:100%;
border-radius:10px;
}

.result{
margin-top:15px;
padding:10px;
background:#f0f0f0;
border-radius:10px;
font-weight:bold;
}

</style>

</head>

<body>

<div class="card">

<h2>Practical 4</h2>
<p><b>Image Classification using MobileNet</b></p>

<input type="file" id="imageUpload" accept="image/*">

<br>

<img id="preview"/>

<p id="status">Loading MobileNet model...</p>

<div id="result" class="result"></div>

</div>

<script src="script.js"></script>

</body>
</html>
