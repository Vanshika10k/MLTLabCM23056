<!DOCTYPE html>
<html>
<head>

<title>Assignment 1 - Train & Save Model</title>

<script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@4.16.0/dist/tf.min.js"></script>

<style>

body{
font-family:Arial;
background:linear-gradient(135deg,#4e73df,#1cc88a);
display:flex;
justify-content:center;
align-items:center;
height:100vh;
color:white;
}

.card{
background:white;
color:black;
padding:30px;
border-radius:15px;
text-align:center;
width:350px;
box-shadow:0px 10px 25px rgba(0,0,0,0.3);
}

button{
padding:10px 20px;
margin:10px;
border:none;
background:#4e73df;
color:white;
border-radius:8px;
cursor:pointer;
}

</style>

</head>

<body>

<div class="card">

<h2>Train and Save Model</h2>

<button onclick="trainModel()">Train Model</button>
<button onclick="saveModel()">Save Model</button>

<p id="status">Model not trained</p>

</div>

<script src="script.js"></script>

</body>
</html>
